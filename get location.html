<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPulse | Alarm & Tracker</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            margin: 0; font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg); color: #1e293b;
            display: flex; flex-direction: column; height: 100vh;
        }

        header {
            background: #1e293b; color: white; padding: 12px;
            text-align: center; font-weight: bold;
        }

        #map { height: 35vh; width: 100%; border-bottom: 2px solid #cbd5e1; }

        .container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        .card {
            background: var(--card); border-radius: 10px; padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
        }

        h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: #64748b; text-transform: uppercase; }

        /* DATA DISPLAY */
        .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .data-box { background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #f1f5f9; }
        .val { font-family: monospace; font-weight: bold; color: var(--primary); display: block; }
        .lbl { font-size: 10px; color: #94a3b8; }

        /* ALARM UI */
        .alarm-active { background: #fee2e2; border: 2px solid var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* INPUTS */
        input, select {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1;
            border-radius: 6px; margin-top: 5px; box-sizing: border-box;
        }

        button {
            padding: 12px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #64748b; }

        .flex-row { display: flex; gap: 10px; }
    </style>
</head>
<body>

<header>🛰️ GEOPULSE ALARM SYSTEM</header>

<div id="map"></div>

<div class="container">
    <div class="card">
        <h4>📡 Live Feed</h4>
        <div class="telemetry">
            <div class="data-box"><span class="lbl">LAT/LNG</span><span id="coords" class="val">0.00, 0.00</span></div>
            <div class="data-box"><span class="lbl">ALTITUDE</span><span id="alt" class="val">--</span></div>
            <div class="data-box"><span class="lbl">ACCURACY</span><span id="acc" class="val">--</span></div>
            <div class="data-box"><span class="lbl">DISTANCE</span><span id="dist" class="val">--</span></div>
        </div>
        <button class="btn-blue" id="trackBtn" onclick="toggleTracking()">Start GPS Tracking</button>
    </div>

    <div id="alarmCard" class="card">
        <h4>🚨 Proximity Alarm</h4>
        <div class="flex-row">
            <div style="flex:1">
                <label class="lbl">Target Radius (Meters)</label>
                <input type="number" id="radiusInput" value="500" placeholder="e.g. 500 or 50000">
            </div>
        </div>
        <button class="btn-outline" onclick="enablePinMode()">📍 Drop Target Pin on Map</button>
        <button class="btn-green" onclick="activateAlarm()">Set Alarm Target</button>
        <button class="btn-red" id="stopAlarmBtn" style="display:none" onclick="silenceAlarm()">🔊 SILENCE ALARM</button>
    </div>

    <div class="card">
        <h4>📝 Remarks & Actions</h4>
        <input type="text" id="remark" placeholder="Remark for this location...">
        <div class="flex-row">
            <button class="btn-blue" onclick="savePoint()">Save Spot</button>
            <button class="btn-outline" onclick="sharePoint()">Share</button>
        </div>
        <div class="flex-row" style="margin-top:5px">
            <button class="btn-outline" style="font-size:11px" onclick="exportCSV()">Export Logs</button>
            <button class="btn-red" style="font-size:11px" onclick="clearData()">Reset All</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    let map = L.map('map').setView([20,78], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker, targetCircle, targetMarker, watchId;
    let isTracking = false, isPinMode = false;
    let targetCoords = null;
    let history = JSON.parse(localStorage.getItem("geo_logs") || "[]");
    let alarmAudio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    alarmAudio.loop = true;

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if(!isTracking) {
            isTracking = true;
            btn.innerText = "Stop Tracking";
            btn.className = "btn-red";
            watchId = navigator.geolocation.watchPosition(updatePosition, null, {enableHighAccuracy: true});
        } else {
            isTracking = false;
            btn.innerText = "Start GPS Tracking";
            btn.className = "btn-blue";
            navigator.geolocation.clearWatch(watchId);
        }
    }

    function updatePosition(pos) {
        const { latitude, longitude, altitude, accuracy } = pos.coords;
        const latlng = [latitude, longitude];

        // Update UI
        document.getElementById('coords').innerText = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
        document.getElementById('alt').innerText = altitude ? altitude.toFixed(1) + "m" : "N/A";
        document.getElementById('acc').innerText = "±" + accuracy.toFixed(0) + "m";

        if (!marker) marker = L.circleMarker(latlng, {radius: 8, color: '#2563eb', fillOpacity: 1}).addTo(map);
        else marker.setLatLng(latlng);
        map.panTo(latlng);

        // Check Proximity
        if (targetCoords) {
            const d = map.distance(latlng, [targetCoords.lat, targetCoords.lng]);
            document.getElementById('dist').innerText = d > 1000 ? (d/1000).toFixed(2) + "km" : Math.round(d) + "m";
            
            const radius = parseFloat(document.getElementById('radiusInput').value);
            if (d <= radius) {
                triggerAlarm();
            }
        }
    }

    function enablePinMode() {
        isPinMode = true;
        alert("Tap the map to set your target destination.");
    }

    map.on('click', (e) => {
        if(!isPinMode) return;
        targetCoords = e.latlng;
        activateAlarm();
        isPinMode = false;
    });

    function activateAlarm() {
        if(!targetCoords) return alert("Select a target on the map first!");
        
        const radius = parseFloat(document.getElementById('radiusInput').value);
        
        if(targetCircle) map.removeLayer(targetCircle);
        if(targetMarker) map.removeLayer(targetMarker);

        targetMarker = L.marker(targetCoords).addTo(map).bindPopup("Target").openPopup();
        targetCircle = L.circle(targetCoords, {
            radius: radius,
            color: '#dc2626',
            fillColor: '#dc2626',
            fillOpacity: 0.15
        }).addTo(map);

        map.fitBounds(targetCircle.getBounds());
    }

    function triggerAlarm() {
        document.getElementById('alarmCard').classList.add('alarm-active');
        document.getElementById('stopAlarmBtn').style.display = 'block';
        alarmAudio.play();
        if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
    }

    function silenceAlarm() {
        alarmAudio.pause();
        document.getElementById('alarmCard').classList.remove('alarm-active');
        document.getElementById('stopAlarmBtn').style.display = 'none';
        targetCoords = null; // Clear target so it doesn't re-trigger immediately
    }

    // --- BASIC UTILITIES ---
    function savePoint() {
        const latlng = marker.getLatLng();
        const remark = document.getElementById('remark').value || "No Remark";
        history.push({time: new Date().toLocaleString(), lat: latlng.lat, lng: latlng.lng, remark});
        localStorage.setItem("geo_logs", JSON.stringify(history));
        alert("Point Saved!");
    }

    function sharePoint() {
        const latlng = marker.getLatLng();
        const url = `https://www.google.com/maps?q=${latlng.lat},${latlng.lng}`;
        navigator.clipboard.writeText(url);
        alert("Google Maps link copied!");
    }

    function exportCSV() {
        let csv = "Time,Lat,Lng,Remark\n" + history.map(h => `${h.time},${h.lat},${h.lng},${h.remark}`).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'geo_logs.csv';
        a.click();
    }

    function clearData() {
        if(confirm("Wipe all data?")) {
            localStorage.removeItem("geo_logs");
            history = [];
            location.reload();
        }
    }
</script>

</body>
</html>

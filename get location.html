<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geo Alert Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height: 55vh; }
.controls { padding:10px; background:#f4f4f4; }
input, button { margin:5px; padding:6px; }
#coords { font-weight:bold; margin-top:10px; }
</style>
</head>

<body>

<div class="controls">

<label>
<input type="checkbox" onchange="toggleTracking(this)"> Enable Tracking
</label>

<label>
<input type="checkbox" onchange="toggleRoute(this)"> Route Tracking
</label>

<br>

Refresh(sec):
<input type="number" id="interval" value="5">

<br>

<h4>🎯 Destination Alert</h4>

Lat: <input id="destLat">
Lng: <input id="destLng">

<br>

Radius (meters):
<input id="radius" type="number" value="500">

<button onclick="setDestination()">Set Destination</button>

<br>

<button onclick="saveLocation()">Save Location</button>
<button onclick="exportCSV()">Export Locations</button>
<button onclick="exportRoute()">Export Route</button>

<div id="coords"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map = L.map('map').setView([20,78],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// STATE
let watchId=null, intervalId=null;
let marker=null;
let routeLine=null;
let routeCoords=[];
let isRoute=false;

let destination=null;
let alertRadius=500;
let alertTriggered=false;

let currentPosition={};
let history = JSON.parse(localStorage.getItem("history") || "[]");

// TRACKING
function toggleTracking(el){
  if(el.checked) startTracking();
  else stopTracking();
}

function startTracking(){
  let interval = document.getElementById("interval").value*1000;

  watchId = navigator.geolocation.watchPosition(updateUI);

  intervalId = setInterval(()=>{
    navigator.geolocation.getCurrentPosition(updateUI);
  }, interval);
}

function stopTracking(){
  navigator.geolocation.clearWatch(watchId);
  clearInterval(intervalId);
}

// ROUTE
function toggleRoute(el){
  isRoute = el.checked;
}

// DESTINATION
function setDestination(){
  let lat = parseFloat(destLat.value);
  let lng = parseFloat(destLng.value);

  alertRadius = parseInt(radius.value);

  destination = {lat, lng};
  alertTriggered=false;

  L.marker([lat,lng]).addTo(map)
    .bindPopup("🎯 Destination")
    .openPopup();
}

// DISTANCE
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3;
  const toRad = x=>x*Math.PI/180;

  let dLat = toRad(lat2-lat1);
  let dLon = toRad(lon2-lon1);

  let a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2;

  let c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

  return R*c;
}

// UPDATE UI
function updateUI(pos){

  let {latitude, longitude, accuracy} = pos.coords;

  currentPosition = {
    lat: latitude,
    lng: longitude,
    time: new Date().toLocaleString()
  };

  document.getElementById("coords").innerHTML =
    `Lat: ${latitude.toFixed(6)} | Lng: ${longitude.toFixed(6)} | Accuracy: ${accuracy.toFixed(0)}m`;

  if(marker) map.removeLayer(marker);
  marker = L.marker([latitude,longitude]).addTo(map);
  map.setView([latitude,longitude],16);

  // ROUTE
  if(isRoute){
    let point=[latitude,longitude];

    if(routeCoords.length>0){
      let last=routeCoords[routeCoords.length-1];
      let dist = map.distance(last, point);
      if(dist<5) return;
    }

    routeCoords.push(point);

    if(routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(routeCoords,{color:'blue'}).addTo(map);
  }

  // DESTINATION ALERT
  if(destination && !alertTriggered){

    let dist = getDistance(
      latitude, longitude,
      destination.lat, destination.lng
    );

    document.getElementById("coords").innerHTML +=
      `<br>Distance: ${dist.toFixed(0)} m`;

    if(dist <= alertRadius){
      triggerAlarm();
      alertTriggered=true;
    }
  }
}

// ALARM
function triggerAlarm(){

  let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
  audio.play();

  if(navigator.vibrate){
    navigator.vibrate([500,200,500]);
  }

  if(Notification.permission==="granted"){
    new Notification("🚨 Destination Reached",{
      body:"You are near your stop"
    });
  }else{
    Notification.requestPermission();
  }

  alert("🚨 You are near destination!");
}

// SAVE
function saveLocation(){
  let remark = prompt("Remark:");
  let data = {...currentPosition, remark};

  history.push(data);
  localStorage.setItem("history", JSON.stringify(history));
}

// EXPORT
function exportCSV(){
  let csv="Lat,Lng,Remark,Time\n";
  history.forEach(h=>{
    csv+=`${h.lat},${h.lng},${h.remark},${h.time}\n`;
  });

  download(csv,"locations.csv");
}

function exportRoute(){
  let csv="Lat,Lng\n";
  routeCoords.forEach(p=>{
    csv+=`${p[0]},${p[1]}\n`;
  });

  download(csv,"route.csv");
}

function download(data,name){
  let blob=new Blob([data]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

// MAP CLICK AUTO FILL
map.on("click",function(e){
  destLat.value = e.latlng.lat;
  destLng.value = e.latlng.lng;
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoTracker MVP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; cursor: crosshair; }
        
        /* Floating UI Panel */
        #ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
            width: 90%; max-width: 400px; text-align: center;
        }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #333; }
        .data-value { font-weight: bold; color: #007bff; }
        
        #status-text { font-size: 12px; color: #666; margin-bottom: 10px; min-height: 15px; font-weight: bold; }
        .instruction { font-size: 11px; color: #888; margin-top: 10px; font-style: italic; }

        .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        button {
            flex: 1; padding: 10px; border: none;
            border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:active { background: #0056b3; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:disabled { background: #88cfa6; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background: #dc3545; color: white; }

        /* History Modal */
        #history-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto;
        }
        .modal-content {
            background: white; margin: 20px auto; padding: 20px;
            width: 90%; max-width: 600px; border-radius: 12px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        
        .delete-btn { background: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-panel">
        <div class="data-row">
            <span>Lat: <span id="ui-lat" class="data-value">--</span></span>
            <span>Lng: <span id="ui-lng" class="data-value">--</span></span>
            <span>Alt: <span id="ui-alt" class="data-value">--</span></span>
        </div>
        <div id="status-text">Ready</div>
        
        <div class="btn-group">
            <button class="btn-primary" onclick="getCurrentLocation()">📍 Locate Me</button>
            <button class="btn-primary" id="btn-toggle-track" onclick="toggleTracking()">🔄 Auto-Track</button>
        </div>
        
        <button class="btn-success" id="btn-save" onclick="saveGPSLocation()" disabled style="width: 100%; margin-top: 10px;">💾 Save GPS Location</button>
        <button class="btn-secondary" onclick="openHistory()">📋 View History & Export</button>
        
        <div class="instruction">💡 Tip: Tap anywhere on the map to drop a custom pin.</div>
    </div>

    <div id="history-modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">Saved Locations</h2>
            <div style="overflow-x: auto;">
                <table id="history-table">
                    <thead><tr><th>Time</th><th>Location</th><th>Remark</th><th>Act</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
            <br>
            <button class="btn-primary" style="width:100%" onclick="exportCSV()">⬇️ Export to CSV</button>
            <button class="btn-secondary" onclick="closeHistory()">Close</button>
        </div>
    </div>

    <script>
        // --- 1. App State & Init ---
        let map, userMarker, watchId = null;
        let currentPos = null;
        let historyData = JSON.parse(localStorage.getItem('geoHistory')) || [];

        // Relaxed GPS Options for Desktop/Mobile compatibility
        const geoOptions = { enableHighAccuracy: false, maximumAge: 10000, timeout: 15000 };

        // Initialize Map
        map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Render existing saved pins on load
        renderSavedPins();

        // --- 2. NEW: Click/Tap Map to Drop Pin ---
        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(5);
            const lng = e.lng.toFixed(5);
            
            const remark = prompt(`Drop pin at ${lat}, ${lng}?\nEnter a remark:` , "Manual Pin");
            if (!remark) return; // User cancelled

            const record = { 
                id: Date.now().toString(),
                lat: lat,
                lng: lng,
                alt: 'N/A',
                acc: 'Manual',
                time: new Date().toISOString(),
                remark: remark
            };
            
            saveRecord(record);
        });

        // --- 3. NEW: Get Current Location (One-off) ---
        function getCurrentLocation() {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "Locating you...";
            statusText.style.color = "#007bff";

            if (!navigator.geolocation) {
                statusText.innerText = "Geolocation not supported.";
                statusText.style.color = "red";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    handlePositionUpdate(position);
                    statusText.innerText = "Location found!";
                    statusText.style.color = "green";
                },
                (err) => handleError(err),
                geoOptions
            );
        }

        // --- 4. Live Auto-Tracking ---
        function toggleTracking() {
            const btn = document.getElementById('btn-toggle-track');
            const statusText = document.getElementById('status-text');
            
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                btn.innerText = "🔄 Auto-Track";
                btn.className = "btn-primary";
                statusText.innerText = "Tracking stopped.";
                statusText.style.color = "#666";
            } else {
                btn.innerText = "⏹ Stop Tracking";
                btn.className = "btn-danger";
                statusText.innerText = "Acquiring signal...";
                statusText.style.color = "#ff8c00";

                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        handlePositionUpdate(position);
                        statusText.innerText = `Tracking active (±${Math.round(position.coords.accuracy)}m)`;
                        statusText.style.color = "green";
                    },
                    (err) => handleError(err),
                    geoOptions
                );
            }
        }

        // --- Core Helpers ---
        function handlePositionUpdate(position) {
            currentPos = {
                lat: position.coords.latitude.toFixed(5),
                lng: position.coords.longitude.toFixed(5),
                alt: position.coords.altitude ? Math.round(position.coords.altitude) + 'm' : 'N/A',
                acc: Math.round(position.coords.accuracy),
                time: new Date().toISOString()
            };

            document.getElementById('ui-lat').innerText = currentPos.lat;
            document.getElementById('ui-lng').innerText = currentPos.lng;
            document.getElementById('ui-alt').innerText = currentPos.alt;
            document.getElementById('btn-save').disabled = false;

            const latLng = [currentPos.lat, currentPos.lng];
            if (!userMarker) {
                userMarker = L.marker(latLng).addTo(map).bindPopup("Your GPS Location").openPopup();
            } else {
                userMarker.setLatLng(latLng);
            }
            map.setView(latLng, 16);
        }

        function handleError(err) {
            let errMsg = "Error finding location.";
            if (err.code === 1) errMsg = "Permission denied.";
            if (err.code === 2) errMsg = "Position unavailable.";
            if (err.code === 3) errMsg = "Request timed out.";
            
            const statusText = document.getElementById('status-text');
            statusText.innerText = errMsg;
            statusText.style.color = "red";
        }

        function saveGPSLocation() {
            if (!currentPos) return;
            const remark = prompt("Enter a remark for your current GPS location:", "My Location");
            if (!remark) return;

            const record = { id: Date.now().toString(), ...currentPos, remark: remark };
            saveRecord(record);
        }

        function saveRecord(record) {
            historyData.push(record);
            localStorage.setItem('geoHistory', JSON.stringify(historyData));
            addPinToMap(record);
            document.getElementById('status-text').innerText = "Pin saved!";
        }

        function addPinToMap(record) {
            L.marker([record.lat, record.lng])
             .addTo(map)
             .bindPopup(`<b>${record.remark}</b><br>${record.lat}, ${record.lng}`);
        }

        function renderSavedPins() {
            historyData.forEach(record => addPinToMap(record));
        }

        // --- History & Export ---
        function openHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            
            [...historyData].reverse().forEach(record => {
                const date = new Date(record.time).toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                tbody.innerHTML += `
                    <tr>
                        <td style="font-size: 12px;">${date}</td>
                        <td style="font-size: 12px;">${record.lat},<br>${record.lng}</td>
                        <td>${record.remark}</td>
                        <td><button class="delete-btn" onclick="deleteRecord('${record.id}')">X</button></td>
                    </tr>
                `;
            });
            document.getElementById('history-modal').style.display = 'block';
        }

        function closeHistory() {
            document.getElementById('history-modal').style.display = 'none';
        }

        function deleteRecord(id) {
            if(confirm("Delete this saved location?")) {
                historyData = historyData.filter(r => r.id !== id);
                localStorage.setItem('geoHistory', JSON.stringify(historyData));
                openHistory();
                alert("Deleted. Refresh page to clear the pin from the map.");
            }
        }

        function exportCSV() {
            if (historyData.length === 0) return alert("No data to export.");
            let csvContent = "data:text/csv;charset=utf-8,Timestamp,Latitude,Longitude,Altitude,Accuracy(m),Remark\n";
            historyData.forEach(row => {
                const safeRemark = `"${row.remark.replace(/"/g, '""')}"`;
                csvContent += `${row.time},${row.lat},${row.lng},${row.alt},${row.acc},${safeRemark}\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `GeoData_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>

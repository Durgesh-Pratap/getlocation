<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPulse | Search & Survey</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc; --accent: #22d3ee; --nav: #fbbf24; --ruler: #ec4899;
        }

        [data-theme="night"] {
            --primary: #991b1b; --bg: #000000; --card: #120000;
            --text: #ff4444; --accent: #ff0000; --nav: #ff0000; --ruler: #ff00ff;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            background: rgba(0,0,0,0.9); padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }

        .main-layout { display: grid; grid-template-columns: 360px 1fr; height: calc(100vh - 50px); }

        .sidebar {
            padding: 15px; overflow-y: auto; background: var(--bg);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 12px;
        }

        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; }

        /* SEARCH BAR GADGET */
        .search-container { position: relative; margin-bottom: 5px; }
        #searchInput {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4); color: var(--text); font-size: 14px; box-sizing: border-box;
        }
        #searchResults {
            position: absolute; width: 100%; background: #1e293b; border-radius: 0 0 8px 8px;
            z-index: 2000; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 12px; }
        .search-item:hover { background: var(--primary); color: white; }

        /* UI ELEMENTS */
        button { cursor: pointer; border: none; border-radius: 8px; padding: 10px; font-weight: 600; color: white; transition: 0.2s; width: 100%; margin-bottom: 5px; }
        .btn-blue { background: var(--primary); }
        .btn-gold { background: var(--nav); color: black; }
        .btn-ruler { background: var(--ruler); }

        #map { width: 100%; height: 100%; }
        [data-theme="night"] #map { filter: invert(100%) hue-rotate(180deg) brightness(0.7); }

        .metric { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: var(--accent); }
        .label { font-size: 9px; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
    </style>
</head>
<body data-theme="day">

<header>
    <span>📡 GEOPULSE COMMAND</span>
    <button onclick="toggleNightMode()" style="background:none; border:1px solid var(--text); color:var(--text); padding:4px 10px; border-radius:5px; cursor:pointer;">🌓 Toggle Night</button>
</header>

<div class="main-layout">
    <div class="sidebar">
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Search location..." onkeyup="searchLocation(this.value)">
            <div id="searchResults"></div>
        </div>

        <div id="rulerHud" class="card" style="display:none; border: 2px solid var(--ruler);">
            <div class="label" style="color: var(--ruler)">📏 Ruler Distance</div>
            <div id="rulerDist" class="metric" style="color: var(--ruler)">0.00 m</div>
            <button onclick="clearRuler()" style="background:rgba(255,255,255,0.1); font-size:10px; margin-top:5px;">Clear Measurements</button>
        </div>

        <div class="card">
            <button class="btn-blue" onclick="toggleTracking(this)" id="trackBtn">Initialize GPS</button>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button class="btn-gold" onclick="enablePinMode()">🎯 Target</button>
                <button class="btn-ruler" onclick="enableRulerMode()">📏 Ruler</button>
            </div>
        </div>

        <div class="card" id="navHud" style="display:none;">
            <div style="display:flex; justify-content: space-between;">
                <div><div class="label">To Target</div><div id="navDist" class="metric">--</div></div>
                <div style="text-align:right"><div class="label">ETA</div><div id="eta" style="font-weight:bold; color:var(--nav)">--</div></div>
            </div>
        </div>

        <div class="card" style="font-size: 10px; opacity: 0.5;">
            LAT: <span id="curLat">--</span> | LNG: <span id="curLng">--</span>
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    let map = L.map('map', {zoomControl: false}).setView([20,78], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let marker, destMarker, watchId, destination;
    let rulerPoints = [], rulerLine, rulerMarkers = [];
    let isTracking = false, isPinMode = false, isRulerMode = false;

    // --- SEARCH LOGIC ---
    let searchTimeout;
    async function searchLocation(query) {
        clearTimeout(searchTimeout);
        const resultsBox = document.getElementById('searchResults');
        if (query.length < 3) { resultsBox.innerHTML = ''; return; }

        searchTimeout = setTimeout(async () => {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await res.json();
            resultsBox.innerHTML = data.map(item => `
                <div class="search-item" onclick="goTo('${item.lat}', '${item.lon}', '${item.display_name.replace(/'/g, "\\'")}')">
                    ${item.display_name}
                </div>
            `).join('');
        }, 500);
    }

    function goTo(lat, lon, name) {
        const coords = [parseFloat(lat), parseFloat(lon)];
        map.flyTo(coords, 14);
        L.popup().setLatLng(coords).setContent(name).openOn(map);
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
    }

    // --- GPS & TELEMETRY ---
    function toggleTracking(btn) {
        if(!isTracking) {
            isTracking = true; btn.innerText = "Disable GPS"; btn.style.background = "#ef4444";
            watchId = navigator.geolocation.watchPosition(updateUI, null, {enableHighAccuracy: true});
        } else {
            isTracking = false; btn.innerText = "Initialize GPS"; btn.style.background = "var(--primary)";
            navigator.geolocation.clearWatch(watchId);
        }
    }

    function updateUI(pos) {
        const { latitude, longitude, speed } = pos.coords;
        document.getElementById('curLat').innerText = latitude.toFixed(4);
        document.getElementById('curLng').innerText = longitude.toFixed(4);
        if (!marker) marker = L.circleMarker([latitude, longitude], { radius: 6, color: 'var(--accent)', fillOpacity: 1 }).addTo(map);
        else marker.setLatLng([latitude, longitude]);
        
        if (destination) {
            const dist = calcDist(latitude, longitude, destination.lat, destination.lng);
            document.getElementById('navDist').innerText = dist > 1000 ? (dist/1000).toFixed(1)+"km" : Math.round(dist)+"m";
            const time = speed > 0.5 ? dist/speed : 0;
            document.getElementById('eta').innerText = time > 0 ? Math.round(time/60)+"m" : "WAITING";
        }
    }

    // --- RULER & TOOLS ---
    function enableRulerMode() { isRulerMode = true; isPinMode = false; document.getElementById('rulerHud').style.display = 'block'; }
    function enablePinMode() { isPinMode = true; isRulerMode = false; document.getElementById('rulerHud').style.display = 'none'; }
    function clearRuler() { 
        rulerPoints = []; rulerMarkers.forEach(m => map.removeLayer(m)); 
        if(rulerLine) map.removeLayer(rulerLine); document.getElementById('rulerDist').innerText = "0.00 m"; 
    }

    map.on('click', (e) => {
        if(isRulerMode) {
            rulerPoints.push(e.latlng);
            rulerMarkers.push(L.circleMarker(e.latlng, {radius: 4, color: 'var(--ruler)'}).addTo(map));
            if(rulerPoints.length > 1) {
                if(rulerLine) map.removeLayer(rulerLine);
                rulerLine = L.polyline(rulerPoints, {color: 'var(--ruler)', dashArray: '5, 10'}).addTo(map);
                let d = 0; for(let i=0; i<rulerPoints.length-1; i++) d += calcDist(rulerPoints[i].lat, rulerPoints[i].lng, rulerPoints[i+1].lat, rulerPoints[i+1].lng);
                document.getElementById('rulerDist').innerText = d > 1000 ? (d/1000).toFixed(2)+" km" : d.toFixed(1)+" m";
            }
        }
        if(isPinMode) {
            destination = { lat: e.latlng.lat, lng: e.latlng.lng };
            if(destMarker) map.removeLayer(destMarker);
            destMarker = L.circle(e.latlng, {radius: 100, color: 'var(--nav)'}).addTo(map);
            document.getElementById('navHud').style.display = 'block';
        }
    });

    function toggleNightMode() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'day' ? 'night' : 'day'); }
    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2-lat1) * Math.PI/180; const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
